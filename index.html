<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rising Star Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-wrapper">
        <div class="form-card">
            <div class="form-header">
                <h2>Join Our Community</h2>
                <p>Start your journey with us today.</p>
            </div>

            <form id="signupForm">
                <!-- CSS Grid Container for Inputs -->
                <div class="input-grid">
                    <div class="input-group">
                        <label for="fname">First Name</label>
                        <input type="text" id="fname" placeholder="first_Name" required>
                    </div>
                    <div class="input-group">
                        <label for="lname">Last Name</label>
                        <input type="text" id="lname" placeholder="last_Name" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="example123@mail.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to the <span>Terms & Conditions</span></label>
                </div>

                <button type="submit" class="submit-btn">Create Account</button>
            </form>

            <div class="form-footer">
                <p>Already have an account? <a href="#">Login here</a></p>
            </div>
        </div>
    </div>

</body>
</html>
